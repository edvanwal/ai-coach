<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — AI Coach</title>
    <style>
      :root {
        --bg: #0f1419;
        --surface: #1a2332;
        --border: #2d3a4d;
        --text: #e6edf3;
        --text-muted: #8b949e;
        --accent: #58a6ff;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }
      .card {
        width: 100%;
        max-width: 520px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 20px;
      }
      h1 {
        margin: 0 0 10px 0;
        font-size: 18px;
      }
      p {
        margin: 0;
        color: var(--text-muted);
        line-height: 1.5;
      }
      a {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Je bent offline</h1>
      <p>
        De app kan nu geen data laden. Zodra je weer internet hebt, herlaad je deze pagina.
      </p>
    </main>
  </body>
</html>
